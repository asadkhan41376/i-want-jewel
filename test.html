<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">

    <!-- Row 1: Hamburger | Logo | Icons -->
    <div class="navbar-top">

    <div class="logo_container">
          <!-- Hamburger (mobile only) -->
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>


      <!-- Logo -->
     <a href="/" class="logo">
      <img src="/assets/our_images/logo.svg" alt="">
      </a>
    </div>

      

      <!-- Desktop Inline Search (hidden on mobile via CSS) -->
      <div class="search-bar search-bar-desktop">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Search for diamond jewellery" />
        <div class="search-actions">
          <button class="icon-btn" title="Image Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
          </button>
          <button class="icon-btn" title="Voice Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- Right Icons -->
      <div class="nav-icons">
       
       
        <button class="icon-btn desktop-only" title="Account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        
        <!-- Wishlist: always -->
        <button class="icon-btn" title="Wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <!-- Cart: always -->
        <button class="icon-btn cart-btn" title="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge">0</span>
        </button>
      </div>
    </div>

    <!-- Row 2: Search Bar -->
    <div class="navbar-search">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Search for diamond jewellery" />
        <div class="search-actions">
          <button class="icon-btn" title="Image Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
          </button>
          <button class="icon-btn" title="Voice Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Row 3: Nav Menu -->
    <nav class="nav-menu">
      <ul class="nav-list">
       
        <li class="nav-item"><a href="/">Home</a></li>
        <li class="nav-item"><a href="about.html">About</a></li>
        <li class="nav-item"><a href="product-default.html">Gift Card</a></li>
        <li class="nav-item"><a href="contact.html">Contact</a></li>
      </ul>
    </nav>


    <!-- ===== MOBILE DRAWER ===== -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<aside class="drawer" id="navDrawer">
  <!-- Drawer Header -->
  <div class="drawer-header">
    <div class="drawer-login-card">
      <div class="drawer-login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="drawer-login-info">
        <div class="drawer-offer">Flat Rs. 500 off</div>
        <div class="drawer-offer-sub">on your first order</div>
        <div class="drawer-login-btns">
          <a href="login.html" class="drawer-btn-login">LOGIN</a>
          <span class="drawer-divider-btn">|</span>
          <a href="register.html" class="drawer-btn-signup">SIGN UP</a>
        </div>
      </div>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
  </div>

  <!-- Nav Links -->
  <ul class="drawer-nav">
    <li><a href="/">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="product-default.html">Gift Card</a></li>
    <li><a href="contact.html">Contact</a></li>
  
  </ul>
</aside>


  </header>

  <!-- ===== HERO SECTION ===== -->
  <section class="hero">
    <div class="swiper mySwiper">
    <div class="swiper-wrapper swiper_wrapper">
      <div class="swiper-slide swiper_slide"><img src="/assets/our_images/banners/1.png" alt=""></div>

      <div class="swiper-slide swiper_slide"><img src="/assets/our_images/banners/gemstone-desktop.webp" alt=""></div>
      
      <div class="swiper-slide swiper_slide"><img src="/assets/our_images/banners/2.png" alt=""></div>

       
      
    </div>
    <div class="swiper-pagination"></div>
  </section>


<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
 <script>
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: 1.2,
 centeredSlides: true,
       spaceBetween: 30,
    //    loop:true,
    loopedSlides: 3,
       
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
       speed: 800, // smooth transition
       autoplay: {
    delay: 3000,
    disableOnInteraction: false,
  },
    });
  </script>


  <script>
  const hamburger = document.querySelector('.hamburger');
  const drawer    = document.getElementById('navDrawer');
  const overlay   = document.getElementById('drawerOverlay');
  const closeBtn  = document.getElementById('drawerClose');

  function openDrawer()  { drawer.classList.add('open'); overlay.classList.add('show'); document.body.style.overflow = 'hidden'; }
  function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('show'); document.body.style.overflow = ''; }

  hamburger.addEventListener('click', openDrawer);
  closeBtn.addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);
</script>
</body>
</html>
